<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viona</title>
    <link rel="icon" href="image/logo/head-logo.png">
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css"/>
    <script src="https://kit.fontawesome.com/3cf65b98ce.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.css"/>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/viona-main.css">
</head>
<body>

    <main class="py-5 w-100 h-100 d-flex justify-content-center align-items-center container">
        <div class="product-card">
            <div class="header-2">
                <span class="badge endirim">Endirim</span>
                <div class="dates-wrapper">
                    <i class="fa-solid fa-bell"></i>
                    <span class="day-span"></span>:
                    <span class="hour-span">16</span>:
                    <span class="minute-span">38</span>:
                    <span class="second-span">2</span>
                </div>
            </div>
            <div class="body">
                <div class="product-image">
                    <img src="image/products/product-1.png">
                    <button class="product-review-button" type="button" data-bs-toggle="modal" data-bs-target="#product-modal-1">
                        Ön baxış
                    </button>
                </div>
                <div class="content">
                    <a href="#" class="product-name">Divan</a>
                    <div class="product-stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </div>
                    <span class="product-text">Lorem ipsum dolor</span>
                    <div class="product-price">
                        <span class="old">900 ₼</span>
                        <span class="new">790 ₼</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/swiper.js"></script>
</body>
</html>
