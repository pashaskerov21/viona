<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viona</title>
    <link rel="icon" href="image/logo/head-logo.png">
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css"/>
    <script src="https://kit.fontawesome.com/3cf65b98ce.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.css"/>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/viona-main.css">
</head>
<body>


    <main class="container py-5 my-5 w-100 d-flex justify-content-center align-items-center">
        <div class="product-card">
            <div class="header">
                
                <button class="favorite-button hidden-item">
                    <i class="fa-regular fa-heart d-none"></i>
                    <i class="fa-solid fa-heart"></i>
                </button>
            </div>
            <div class="body">
                <div class="product-image">
                    <div class="swiper product-top-swiper">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide">
                                <img src="image/products/product-1.png">
                            </div>
                            <div class="swiper-slide">
                                <img src="image/products/product-1.png">
                            </div>
                            <div class="swiper-slide">
                                <img src="image/products/product-1.png">
                            </div>
                        </div>
                    </div>
                    <div class="hidden-item">
                        <div class="swiper product-thumb-swiper" thumbsSlider="">
                            <div class="swiper-wrapper">
                                <div class="swiper-slide swiper-slide-thumb-active">
                                    <img src="image/products/product-1.png">
                                </div>
                                <div class="swiper-slide">
                                    <img src="image/products/product-1.png">
                                </div>
                                <div class="swiper-slide">
                                    <img src="image/products/product-1.png">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="content">
                    <a href="#" class="product-name">Divan</a>
                    <div class="product-stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </div>
                    <span class="product-text">Lorem ipsum dolor</span>
                    <div class="product-price">
                        <span class="old">900 ₼</span>
                        <span class="new">790 ₼</span>
                    </div>
                </div>
            </div>
            <div class="footer hidden-item">
                <button class="basket-button">
                    <a href="#" class="name">
                        <img src="image/icon/basket-icon.png">
                        <span>Səbətə at</span>
                    </a>
                </button>
            </div>
        </div>
    </main>




    <script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/swiper.js"></script>
</body>
</html>
